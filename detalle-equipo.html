<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Detalle de equipo | FERJER</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .notif-campana { position: relative; cursor: pointer; }
    .notif-badge { position: absolute; top: -6px; right: -6px; background: #ef4444; color: white; font-size: 0.65rem; font-weight: 700; border-radius: 999px; padding: 1px 5px; min-width: 18px; text-align: center; line-height: 1.4; }
    .notif-dropdown { width: 340px; max-height: 420px; overflow-y: auto; position: fixed !important; top: 58px !important; right: 16px !important; left: auto !important; z-index: 99999 !important; }
  </style>
</head>
<body class="app-space">
  <div class="d-flex">
    <aside class="sidebar sidebar-app">
      <div class="p-3 border-app border-bottom">
        <div class="d-flex align-items-center gap-2">
          <span class="brand-dot"></span>
          <div class="fw-bold text-white">FERJER</div>
        </div>
        <small class="text-app-muted">Sistema de seguimiento</small>
      </div>
      <nav class="p-2" id="sidebarNav"></nav>
      <div class="p-3 mt-auto border-app border-top">
        <button id="btnLogout" class="btn btn-app-outline w-100">Cerrar sesión</button>
      </div>
    </aside>

    <main class="flex-grow-1">
      <header class="topbar-app">
        <div class="container-fluid py-3 d-flex align-items-center justify-content-between flex-wrap gap-2">
          <div>
            <h1 class="h5 mb-0 fw-semibold text-white">Detalle de equipo</h1>
            <small class="text-app-muted">Seguimiento por folio</small>
          </div>
          <div class="d-flex align-items-center gap-3">
            <a class="btn btn-app-outline btn-sm" href="equipos.html">Volver</a>
            <span class="text-app-muted small" id="topbarUsuario"></span>
            <div class="dropdown notif-campana d-none" id="notifCampana">
              <button class="btn btn-link text-white p-1 position-relative" type="button"
                      data-bs-toggle="dropdown" data-bs-auto-close="outside" title="Notificaciones">
                🔔 <span class="notif-badge d-none" id="notifBadge">0</span>
              </button>
              <div class="dropdown-menu dropdown-menu-end notif-dropdown shadow rounded-4 p-0">
                <div class="px-3 py-2 border-bottom">
                  <div class="d-flex align-items-center justify-content-between">
                    <span class="fw-semibold small">Notificaciones</span>
                    <a href="#" class="small text-danger text-decoration-none" id="btnMarcarTodas">Eliminar todas</a>
                  </div>
                  <a href="#" class="small text-secondary text-decoration-none d-none mt-1 d-block" id="btnEliminarSel">✓ Eliminar seleccionadas</a>
                </div>
                <ul class="list-unstyled mb-0" id="notifLista">
                  <li class="dropdown-item text-secondary small text-center py-3">Cargando...</li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </header>

      <section class="container-fluid py-4">

        <!-- Card principal -->
        <div class="card card-app rounded-4 mb-4">
          <div class="card-body">
            <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
              <div>
                <div class="text-app-muted small">Folio</div>
                <div class="fs-4 fw-bold text-white" id="detFolio">-</div>
              </div>
              <div>
                <div class="text-app-muted small">Estatus actual</div>
                <div class="fw-semibold badge-status px-3 py-2" id="detEstatus">-</div>
              </div>
            </div>
            <div class="mt-4">
              <div class="text-app-muted small">Cliente</div>
              <div class="fw-semibold text-white" id="detCliente">-</div>
              <div class="text-app-muted" id="detCorreo">-</div>
              <div class="text-app-muted" id="detTelefono">-</div>
            </div>
            <div class="mt-4">
              <div class="text-app-muted small">Equipo</div>
              <div class="fw-semibold text-white" id="detEquipo">-</div>
              <div class="text-app-muted small" id="detFecha">-</div>
            </div>
            <div class="mt-4">
              <div class="text-app-muted small">Falla reportada</div>
              <div class="text-white" id="detFalla">-</div>
            </div>
          </div>
        </div>

        <!-- Sección garantía (se rellena por JS) -->
        <div id="garantiaSection"></div>

        <!-- Historial -->
        <div class="card card-app rounded-4 mt-4">
          <div class="card-body">
            <h2 class="h6 fw-semibold mb-3 text-white">Historial</h2>
            <div class="table-responsive table-shell">
              <table class="table table-app table-hover align-middle mb-0">
                <thead>
                  <tr><th>Fecha</th><th>Estatus</th><th>Comentario</th></tr>
                </thead>
                <tbody id="histBody"></tbody>
              </table>
            </div>
            <div id="histEmpty" class="text-center text-app-muted py-4 d-none">No hay historial para este folio.</div>
            <div id="histErr" class="alert alert-danger d-none mt-3"></div>
          </div>
        </div>

      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
